<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mia Darling — Bienvenue</title>
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #000000;
      --purple-dark: #25015B;
      --purple-mid: #6A3FBF;
      --purple-light: #A66CFF;
      --purple-soft: #C29AFF;
      --white: #FFFFFF;

      --surface: rgba(255, 255, 255, .03);
      --border: rgba(255, 255, 255, .08);
      --border-accent: rgba(166, 108, 255, .35);
      --text-muted: rgba(255, 255, 255, .45);
      --text-sub: rgba(255, 255, 255, .65);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      /* subtle purple radial glow far bottom-left */
      background-image:
        radial-gradient(ellipse 60% 40% at 10% 110%, rgba(37, 1, 91, .55) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 90% -10%, rgba(106, 63, 191, .2) 0%, transparent 60%);
    }

    /* ─── Layout ─────────────────────────────────── */
    .wrap {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ─── Logo ───────────────────────────────────── */
    .logo-section {
      text-align: center;
      padding: 0 0 36px;
    }

    .logo-img {
      width: 56px;
      height: 56px;
      margin-bottom: 18px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .logo-name {
      font-family: 'Great Vibes', cursive;
      font-size: 3.2rem;
      font-weight: 400;
      letter-spacing: .02em;
      color: var(--white);
      margin-bottom: 6px;
      line-height: 1;
    }

    .logo-name span {
      color: var(--purple-soft);
    }

    .logo-tagline {
      font-size: .8rem;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    /* ─── Card ───────────────────────────────────── */
    .card { 
      border-radius: 18px;
      padding: 32px;
    }

    /* ─── Tabs ───────────────────────────────────── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 30px;
    }

    .tab {
      flex: 1;
      background: none;
      border: none;
      padding: 0 0 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      position: relative;
      transition: color .2s;
    }

    .tab::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--purple-light);
      transform: scaleX(0);
      transition: transform .25s ease;
    }

    .tab:hover {
      color: var(--text-sub);
    }

    .tab.active {
      color: var(--purple-soft);
    }

    .tab.active::after {
      transform: scaleX(1);
    }

    /* ─── Tab content ────────────────────────────── */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: rise .3s ease;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── Section titles ─────────────────────────── */
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 8px;
    }

    .section-desc {
      font-size: .85rem;
      font-weight: 300;
      color: var(--text-sub);
      line-height: 1.65;
      margin-bottom: 26px;
    }

    /* ─── Inputs ─────────────────────────────────── */
    .input-label {
      display: block;
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .input-field {
      width: 100%;
      background: rgba(255, 255, 255, .04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      transition: border-color .2s, background .2s;
      margin-bottom: 22px;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--purple-mid);
      background: rgba(166, 108, 255, .05);
    }

    .input-field::placeholder {
      color: rgba(255, 255, 255, .2);
    }

    /* ─── Buttons ────────────────────────────────── */
    .btn-primary {
      width: 100%;
      background: var(--purple-light);
      color: #0a0010;
      border: none;
      border-radius: 10px;
      padding: 15px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .04em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      transition: background .2s, transform .15s, box-shadow .2s;
    }

    .btn-primary:hover {
      background: var(--purple-soft);
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(166, 108, 255, .25);
    }

    .btn-primary:disabled {
      opacity: .38;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-ghost {
      width: 100%;
      background: transparent;
      color: var(--purple-light);
      border: 1px solid var(--border-accent);
      border-radius: 10px;
      padding: 15px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      transition: background .2s, border-color .2s;
    }

    .btn-ghost:hover {
      background: rgba(166, 108, 255, .08);
      border-color: var(--purple-light);
    }

    /* ─── Google button ──────────────────────────── */
    .btn-google {
      width: 100%;
      background: #ffffff;
      color: #1f1f1f;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: .92rem;
      font-weight: 600;
      letter-spacing: .01em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      transition: transform .15s, box-shadow .2s, opacity .2s;
    }

    .btn-google:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(255, 255, 255, .12);
    }

    .btn-google:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-google .g-logo {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .btn-google .spinner {
      border: 2px solid rgba(31, 31, 31, .25);
      border-top-color: #1f1f1f;
    }

    /* ─── Code display ───────────────────────────── */
    .code-display {
      border: 1px solid var(--border-accent);
      border-radius: 12px;
      padding: 20px;
      margin: 22px 0;
      background: rgba(37, 1, 91, .15);
    }

    .code-label {
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .code-value {
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--purple-soft);
      letter-spacing: .2em;
      word-break: break-all;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--border-accent);
      border-radius: 7px;
      padding: 6px 14px;
      color: var(--purple-light);
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 14px;
      transition: background .2s;
    }

    .copy-btn:hover {
      background: rgba(166, 108, 255, .1);
    }

    .copy-btn.copied {
      color: #50c878;
      border-color: rgba(80, 200, 120, .4);
    }

    .code-warning {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      background: rgba(255, 100, 100, .07);
      border: 1px solid rgba(255, 100, 100, .2);
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 16px;
      font-size: .8rem;
      color: var(--text-sub);
      line-height: 1.55;
    }

    .warn-icon {
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ─── Error ──────────────────────────────────── */
    .error-msg {
      background: rgba(255, 80, 80, .08);
      border: 1px solid rgba(255, 80, 80, .2);
      border-radius: 10px;
      padding: 11px 15px;
      color: #ff7070;
      font-size: .85rem;
      margin-bottom: 18px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    /* ─── Spinner ────────────────────────────────── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(10, 0, 16, .3);
      border-top-color: #0a0010;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ─── Success card ───────────────────────────── */
    #successCard {
      text-align: center;
    }

    .check-ring {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid var(--border-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      animation: pulse-ring 2.5s ease-in-out infinite;
    }

    @keyframes pulse-ring {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(166, 108, 255, .3);
      }

      50% {
        box-shadow: 0 0 0 14px rgba(166, 108, 255, 0);
      }
    }

    .check-ring svg {
      width: 28px;
      height: 28px;
      stroke: var(--purple-light);
      stroke-width: 2.5;
      fill: none;
    }

    .success-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .success-sub {
      color: var(--text-sub);
      font-size: .85rem;
      margin-bottom: 22px;
    }

    .anon-name {
      font-size: .95rem;
      font-weight: 500;
      color: var(--purple-soft);
      background: rgba(166, 108, 255, .08);
      border: 1px solid var(--border-accent);
      border-radius: 8px;
      padding: 10px 16px;
      display: inline-block;
      margin-bottom: 26px;
      letter-spacing: .03em;
    }

    /* ─── Features strip ─────────────────────────── */
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 6px;
    }

    .feature {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
      background: var(--surface);
    }

    .feature-icon {
      font-size: 1.3rem;
      margin-bottom: 8px;
    }

    .feature-label {
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ─── Responsive ─────────────────────────────── */
    @media (max-width: 500px) {
      .logo-name {
        font-size: 2.2rem;
      }

      .card {
        padding: 22px;
      }

      .tabs {
        flex-direction: column;
        border-bottom: none;
        gap: 4px;
      }

      .tab {
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 11px 16px;
        text-align: left;
      }

      .tab.active {
        border-color: var(--border-accent);
        background: rgba(166, 108, 255, .06);
      }

      .tab::after {
        display: none;
      }

      .features {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="wrap">

    <!-- Logo -->
    <div class="logo-section"> 
      <h1 class="logo-name">Mia <span>Darling</span></h1>
      <p class="logo-tagline">Espace de partage anonyme &amp; bienveillant</p>
    </div>

    <!-- Main card -->
    <div class="card" id="mainCard">
      <h2 class="section-title">Bienvenue</h2>
      <p class="section-desc">Connecte-toi avec Google pour accéder au forum. Ton identité reste
        <strong style="color:var(--purple-soft)">anonyme</strong> : ton vrai nom et ton email ne sont jamais
        affichés aux autres membres.</p>

      <div class="error-msg" id="errorMsg">Une erreur est survenue. Réessaie.</div>

      <button class="btn-google" id="googleBtn" onclick="signIn()">
        <svg class="g-logo" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C39.9 36 44 30.6 44 24c0-1.3-.1-2.3-.4-3.5z"/>
        </svg>
        <span id="googleBtnText">Continuer avec Google</span>
        <span class="spinner" id="googleSpinner" style="display:none"></span>
      </button> 
    </div>

    <!-- Success card -->
    <div class="card" id="successCard" style="display:none">
      <div class="check-ring">
        <svg viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h2 class="success-title">Bienvenue !</h2>
      <p class="success-sub">Votre identité anonyme est prête</p>
      <div class="anon-name" id="anonymousNameDisplay"></div>
      <button class="btn-primary" onclick="goToForum()">Accéder au forum →</button>
    </div>


  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    const SM = () => window.MiaDarling && window.MiaDarling.SessionManager;

    document.addEventListener('DOMContentLoaded', () => init());

    // Attend que supabase-config.js soit prêt puis traite l'état de connexion
    async function init(tries = 0) {
      const ready = window.MiaDarling && window.MiaDarling.getSupabase();
      if (!ready) {
        if (tries < 40) return setTimeout(() => init(tries + 1), 100);
        return showError('Service indisponible. Recharge la page.');
      }
      await handleAuthState();
    }

    // Si une session Google est active (déjà connecté ou retour d'OAuth),
    // on lie/retrouve l'identité anonyme et on affiche le succès.
    async function handleAuthState() {
      const sb = window.MiaDarling.getSupabase();
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return; // pas connecté : on attend le clic sur le bouton

      setLoading(true);
      const result = await SM().getOrCreateSession();

      if (!result || !result.sessionToken) {
        if (result && result.banned) showError('Cette identité a été bannie.');
        else showError('Connexion impossible. Réessaie.');
        await SM().signOut();
        setLoading(false);
        return;
      }
      showSuccess(result.session && result.session.anonymous_name || 'Anonyme');
    }

    async function signIn() {
      hideError();
      setLoading(true);
      // Page de retour = cette page (sans hash)
      const redirectTo = window.location.href.split('#')[0];
      const { error } = await SM().signInWithGoogle(redirectTo);
      if (error) {
        showError("La connexion Google n'est pas disponible.");
        setLoading(false);
      }
      // Sinon : redirection vers Google en cours
    }

    function setLoading(on) {
      const btn = document.getElementById('googleBtn');
      const txt = document.getElementById('googleBtnText');
      const spin = document.getElementById('googleSpinner');
      btn.disabled = on;
      txt.textContent = on ? 'Connexion…' : 'Continuer avec Google';
      spin.style.display = on ? 'inline-block' : 'none';
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('show');
    }

    function showSuccess(name) {
      document.getElementById('mainCard').style.display = 'none';
      document.getElementById('successCard').style.display = 'block';
      document.getElementById('anonymousNameDisplay').textContent = name;
    }

    function goToForum() { window.location.href = 'index.html'; }
  </script>
</body>

</html>
