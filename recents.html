<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Confidences — Mia Darling</title>
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .recents-page {
      padding: 100px 48px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 40px;
    }

    .page-title {
      font-size: 36px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 8px;
    }

    .page-subtitle {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .filter-pill {
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font);
    }

    .filter-pill:hover,
    .filter-pill.active {
      background: rgba(166, 108, 255, 0.2);
      border-color: var(--purple-light);
      color: var(--purple-light);
    }

    /* Posts Grid */
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    /* Post Card */
    .post-card {
      background: var(--glass);
      border: 1px solid rgba(166, 108, 255, 0.2);
      border-radius: 24px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .post-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--purple-mid), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .post-card:hover {
      border-color: var(--purple-light);
      transform: translateY(-4px);
    }

    .post-card:hover::before {
      opacity: 1;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .post-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple-dark), var(--purple-mid));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    .post-author-info {
      flex: 1;
    }

    .post-author-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
    }

    .post-time {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
    }

    .post-mood {
      font-size: 11px;
      color: var(--purple-soft);
      background: rgba(166, 108, 255, 0.15);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .post-content {
      font-size: 15px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .post-footer {
      display: flex;
      align-items: center;
      gap: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .reaction-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      cursor: pointer;
      transition: color 0.2s;
      font-family: var(--font);
    }

    .reaction-btn:hover {
      color: var(--purple-light);
    }

    .reaction-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      stroke: rgba(255, 255, 255, 0.2);
      margin-bottom: 20px;
    }

    .empty-title {
      font-size: 20px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
    }

    .empty-desc {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.4);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: rgba(255, 255, 255, 0.4);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .recents-page {
        padding: 88px 20px 60px;
      }
      .posts-grid {
        grid-template-columns: 1fr;
      }
      .page-title {
        font-size: 28px;
      }
      .filter-bar {
        gap: 8px;
      }
      .filter-pill {
        padding: 8px 16px;
        font-size: 13px;
      }
    }

    @media (max-width: 480px) {
      .recents-page {
        padding: 72px 12px 60px;
      }
      .page-title {
        font-size: 24px;
      }
      .page-subtitle {
        font-size: 14px;
      }
      .filter-pill {
        padding: 7px 14px;
        font-size: 12px;
      }
      .post-card {
        padding: 18px;
        border-radius: 18px;
      }
      .post-content {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="index.html">
      <img src="assets/logo.png" alt="Mia Darling"> 
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="groupes.html">Cercles de soutien</a></li>
      <li><a href="recents.html" class="active">Confidences</a></li>
      <li><a href="mes-publications.html">Mes publications</a></li>
    </ul>
    <div class="nav-user">
      <div class="user-info" id="userInfo">
        <span class="user-name" id="userName">Chargement...</span>
        <span class="user-stats" id="userStats"></span>
      </div>
      <button class="btn-logout" onclick="logout()" title="Changer de compte">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </button>
    </div>
  </nav>

  <div class="recents-page">
    <div class="page-header">
      <h1 class="page-title">Confidences</h1>
      <p class="page-subtitle">Bienvenue sur le mur de confidences</p>
    </div>

    <div class="filter-bar">
      <button class="filter-pill active" onclick="setFilter(this, 'recents')">Les plus récents</button>
      <button class="filter-pill" onclick="setFilter(this, 'populaires')">Les plus populaires</button>
      <button class="filter-pill" onclick="setFilter(this, 'commentes')">Plus commentés</button>
    </div>

    <div class="posts-grid" id="postsGrid">
      <div class="loading">Chargement...</div>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/mobile-nav.js"></script>
  <script>
    let currentFilter = 'recents';
    let currentSession = null;

    // Check session
    (async function checkSession() {
      const result = await MiaDarling.SessionManager.getOrCreateSession();
      if (!result || !result.sessionToken) {
        window.location.href = 'welcome.html';
        return;
      }
      currentSession = result.session;
      document.getElementById('userName').textContent = currentSession.anonymous_name || 'Anonyme';
      loadPosts();
    })();

    async function logout() {
      if (!confirm('Se déconnecter ?')) return;
      await MiaDarling.SessionManager.signOut();
      window.location.href = 'welcome.html';
    }

    // Load posts
    async function loadPosts() {
      const container = document.getElementById('postsGrid');
      
      let posts;
      if (currentFilter === 'recents') {
        posts = await MiaDarling.PostsAPI.getRecent(20);
      } else if (currentFilter === 'populaires') {
        posts = await MiaDarling.PostsAPI.getPopular(20);
      } else {
        posts = await MiaDarling.PostsAPI.getRecent(20);
      }

      if (!posts || posts.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <div class="empty-title">Aucun témoignage</div>
            <div class="empty-desc">Soyez le premier à partager votre voix</div>
          </div>
        `;
        return;
      }

      container.innerHTML = posts.map(post => `
        <div class="post-card" onclick="window.location.href='post.html?id=${post.id}'">
          <div class="post-header">
            <div class="post-avatar">${post.authorName?.charAt(0) || '?'}</div>
            <div class="post-author-info">
              <div class="post-author-name">${post.authorName || 'Anonyme'}</div>
              <div class="post-time">${formatTime(post.createdAt)}</div>
            </div>
            ${post.mood ? `<span class="post-mood">${post.mood}</span>` : ''}
          </div>
          <div class="post-content">${escapeHtml(post.content)}</div>
          <div class="post-footer">
            <button class="reaction-btn" onclick="event.stopPropagation(); toggleReaction(${post.id})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
              <span>${post.reactionsCount || 0}</span>
            </button>
            <button class="reaction-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
              <span>${post.commentsCount || 0}</span>
            </button>
          </div>
        </div>
      `).join('');
    }

    // Filter
    function setFilter(btn, filter) {
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = filter;
      loadPosts();
    }

    // Toggle reaction
    async function toggleReaction(postId) {
      await MiaDarling.ReactionsAPI.toggle(postId, 'heart');
      loadPosts();
    }

    // Helpers
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTime(dateStr) {
      const date = new Date(dateStr);
      const now = new Date();
      const diff = now - date;

      if (diff < 60000) return "À l'instant";
      if (diff < 3600000) return `il y a ${Math.floor(diff / 60000)} min`;
      if (diff < 86400000) return `il y a ${Math.floor(diff / 3600000)}h`;
      if (diff < 604800000) return `il y a ${Math.floor(diff / 86400000)}j`;

      return date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
    }
  </script>
</body>
</html>
